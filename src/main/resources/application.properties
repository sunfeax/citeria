spring.application.name=citeria

server.port=8082

spring.web.locale=en
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/citeria_db}
spring.datasource.username=${DB_USERNAME:vlad}
spring.datasource.password=${DB_PASSWORD:vlad}

# Schema migrations only by default. The 'dev' profile additionally loads db/seed.
spring.flyway.locations=classpath:db/migration

# enable fail on unknown fields
spring.jackson.deserialization.fail-on-unknown-properties=true
# all timestamps are Instant, serialized as ISO-8601 UTC (e.g. 2026-06-19T10:00:00Z) by default

# Dev fallback only. MUST be overridden in production via the APP_JWT_SECRET env var.
app.jwt.secret=${APP_JWT_SECRET:eaWG/n8Hr/gKIsTLvfJlQ53Zq7R8Af64avDGWUM6RpQAPtPu5S8L6CcnocoodPSK}

# 15 mins
app.jwt.accessExpiration=900000 
# 7 days
app.jwt.refreshExpiration=604800000
# cleanup interval for expired refresh tokens (1 hour)
app.jwt.refreshCleanupIntervalMs=3600000

# true for production
app.jwt.refreshCookieSecure=false

app.cors.allowed-origin=http://localhost:4200

# Single application-wide booking timezone. Working hours (wall-clock) and the
# "from next day" rule are interpreted in this zone. Move to per-business later.
app.booking.zone=${APP_BOOKING_ZONE:UTC}
# How many days ahead slots are returned when no explicit 'to' is provided, and
# the hard cap on the requested slot window.
app.booking.defaultHorizonDays=14
app.booking.maxHorizonDays=60
# Payment window after the specialist accepts: min(acceptedAt + window, start - buffer).
app.booking.paymentWindowHours=24
app.booking.preAppointmentBufferHours=6
# How often overdue unpaid appointments are released (5 minutes).
app.booking.paymentExpiryCheckIntervalMs=300000
# Max number of PENDING (awaiting specialist decision) requests one client may hold at once.
app.booking.maxPendingPerClient=10

# Per-IP rate limit for auth endpoints (login/register): `capacity` requests per `refillMinutes`.
app.ratelimit.auth.capacity=10
app.ratelimit.auth.refillMinutes=1
