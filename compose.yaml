services:
  db:
    image: 'postgres:16'
    restart: always
    environment:
      POSTGRES_DB: citeria_db
      POSTGRES_PASSWORD: vlad
      POSTGRES_USER: vlad
    ports:
      - '5432:5432'
    networks:
      - citeria_net
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    ports:
      - '8081:8080'
    networks:
      - citeria_net

networks:
  citeria_net:

volumes:
  postgres_data:
